# rustqual.toml — Configuration for the rustqual code quality analyzer
#
# Place this file in your project root.
# Run `rustqual --init` to generate this file.

# ── Function Classification ──────────────────────────────────────────────

# External crate/function prefixes that are allowed inside operations.
# Calls matching these prefixes are NOT counted as "own function calls".
external_prefixes = [
    # ── Standard library & language ──
    "std",
    "core",
    "alloc",
    "str",
    # ── External crates ──
    "log",
    "tracing",
    "anyhow",
    "thiserror",
    "serde",
    "serde_json",
    "rusqlite",
    "tree_sitter",
    "tokio",
    "ignore",
    "rayon",
    "toml",
    "clap",
    "rmcp",
    # ── Macros / builtins ──
    "println",
    "eprintln",
    "format",
    "vec",
    "dbg",
    "todo",
    "unimplemented",
    "panic",
    "assert",
    "assert_eq",
    "assert_ne",
    "debug_assert",
    # ── rlm leaf operations (pure logic, no own calls) ──
    "map_err",
    "get_config",
    "get_db",
    "print_json",
    "estimate_tokens",
    "estimate_tokens_str",
    "sanitize_fts_query",
    "format_json",
    "format_with_tokens",
    # ── Enum constructors / struct constructors ──
    "ChunkKind",
    "ChunkCaptureResult",
    "RefKind",
    "Chunk::stub",
    "Partition::new",
    "TreeNode::new",
    "FileOutcome",
    "PrefixFilter",
    "QueryMatchResult",
    "TsParentContext",
    "RlmError",
    "ParseQuality",
    "FilterAction",
    # ── Database methods (leaf DB operations) ──
    "Database::open",
    "upsert_file",
    "get_file_by_path",
    "get_all_files",
    "get_all_file_paths",
    "get_all_chunks",
    "get_chunks_for_file",
    "get_chunks_by_ident",
    "get_chunk_by_id",
    "get_refs_to",
    "get_refs_for_file",
    "insert_chunk",
    "insert_ref",
    "delete_file",
    "delete_file_by_path",
    "delete_chunks_for_file",
    "search_fts",
    "set_file_parse_quality",
    "get_files_with_quality_issues",
    "verify_integrity",
    "fix_orphans",
    "record_savings",
    "get_savings_by_command",
    "get_scoped_file_sizes",
    "get_symbol_file_sizes",
    "index_exists",
    "ensure_rlm_dir",
    # ── Pure helper operations ──
    "apply_ui_context",
    "build_document_fallback",
    "build_peek_file",
    "byte_offset_of_line",
    "classify_sibling",
    "collect_heading_positions",
    "collect_structured_entries",
    "extract_fn_signature",
    "extract_html_id_signature",
    "extract_raw_methods",
    "extract_rust_visibility",
    "find_node_at_byte_range",
    "first_child_text_by_kind",
    "format_chunks_json",
    "gather_chunk_metadata",
    "insert_at_line",
    "is_important_key",
    "matches_path_filter",
    "partition_uniform",
    "process_structured_entry",
    "quality_label",
    "read_file_source",
    "resolve_ref_chunk_id",
    "should_filter_unknown",
    "toml_table_to_json",
    "yaml_key_to_string",
    "yaml_value_to_string",
    # ── MCP/CLI helpers ──
    "success_text",
    "error_text",
    "ensure_db",
    "config",
    "to_json",
    "cmd_single_file_op",
    "cmd_quality_clear",
    "cmd_quality_display",
    "emit_read_symbol",
    "record_file_op",
    "record_symbol_op",
    "record_scoped_op",
    "file_op_result",
    # Self:: prefixed variants (rustqual matches full call name)
    "Self::success_text",
    "Self::error_text",
    "Self::to_json",
    "Self::needs_schema_migration",
    "Self::error_text",
    # NOTE: .method() calls cannot be matched by external_prefixes (rustqual limitation).
    # See iosp-analyzer/bugs/method_calls_not_matchable_by_external_prefixes.md
    # ── Remaining own-crate leaf functions ──
    "ext_to_lang",
    "find_symbol_in_file",
